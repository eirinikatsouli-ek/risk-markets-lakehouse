version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: risk_postgres
    environment:
      POSTGRES_USER: risk
      POSTGRES_PASSWORD: risk
      POSTGRES_DB: riskdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:latest
    container_name: risk_metabase
    depends_on:
      - postgres
    ports:
      - "3000:3000"

volumes:
  pgdata: